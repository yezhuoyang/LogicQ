<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200" role="img" aria-label="LogicQ">
  <defs>
    <linearGradient id="lq-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.5" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="lq-grad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <filter id="lq-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0ea5e9" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Qubit "Q" mark: a qubit with electron orbits -->
  <g transform="translate(96,100)" filter="url(#lq-shadow)">
    <!-- outer ring -->
    <circle r="58" fill="none" stroke="url(#lq-grad)" stroke-width="10"/>
    <!-- orbit ellipses (superposition) -->
    <ellipse rx="58" ry="22" fill="none" stroke="#0ea5e9" stroke-width="3" opacity="0.55" transform="rotate(28)"/>
    <ellipse rx="58" ry="22" fill="none" stroke="#22d3ee" stroke-width="3" opacity="0.55" transform="rotate(-28)"/>
    <!-- nucleus / |0> state -->
    <circle r="13" fill="url(#lq-grad)"/>
    <!-- orbiting state nodes -->
    <circle cx="51" cy="27" r="6" fill="#22d3ee" transform="rotate(28)"/>
    <circle cx="-51" cy="-27" r="6" fill="#6366f1" transform="rotate(28)"/>
    <!-- Q tail -->
    <line x1="34" y1="34" x2="66" y2="66" stroke="url(#lq-grad)" stroke-width="11" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="184" y="112" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="76" font-weight="700" fill="url(#lq-grad2)">Logic<tspan fill="url(#lq-grad)">Q</tspan></text>
  <text x="188" y="150" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="500" letter-spacing="2" fill="#64748b">VERIFIED QEC COMPILATION · LEAN 4</text>
</svg>
